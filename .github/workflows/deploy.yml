name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/gerlin3d/ideas-generator
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy?schema=public
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/ideas-generator
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Smoke test
        run: |
          for i in {1..10}; do
            echo "Smoke test attempt $i..."
            response="$(curl -fsS https://ideas-gen.gerlin.site/api/health)" && {
              echo "Health endpoint response:"
              echo "$response"
              exit 0
            }

            echo "Health check failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "Health check failed after retries."
          exit 1
